name: ci

# Build + test on push to main and on PRs. Mirrors the weft-ha-postgresql CI:
# the embedded-etcd + grpc integration tests run natively (amd64/arm64), while
# the whole module is cross-built on the 6 supported 64-bit architectures.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - run: gofmt -l . | tee /dev/stderr | (! read)
      - run: go vet ./...
      - env:
          GOWORK: off
        run: go test ./... -race -count=1

  cross-build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goarch: [amd64, arm64, riscv64, loong64, ppc64le, s390x]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - name: build linux/${{ matrix.goarch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          GOWORK: off
        run: go build -trimpath -ldflags '-s -w' ./...
